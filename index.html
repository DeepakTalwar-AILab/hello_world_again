<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Bebas Neue', sans-serif;
    }

    .container {
      position: relative;
      text-align: center;
    }

    h1 {
      font-size: 10rem;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #ff6ec7, #ff9a3c, #ffe135, #3cffd0, #6e8bff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease infinite, popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      filter: drop-shadow(0 0 30px rgba(255, 110, 199, 0.6));
    }

    .subtitle {
      color: #888;
      font-size: 1.2rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: -1rem;
      animation: fadeUp 1s ease 0.4s both;
      font-family: sans-serif;
      font-weight: 300;
    }

    .particles {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 300px;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: orbit linear infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    @keyframes orbit {
      from { transform: rotate(0deg) translateX(200px) rotate(0deg); opacity: 1; }
      to   { transform: rotate(360deg) translateX(200px) rotate(-360deg); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="container">
    <h1>Hi, my name is Deepak 👋</h1>
    <p class="subtitle">welcome to the party</p>
  </div>

  <script>
    const colors = ['#ff6ec7','#ff9a3c','#ffe135','#3cffd0','#6e8bff'];
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const color = colors[i % colors.length];
      p.style.cssText = `
        background: ${color};
        top: 50%; left: 50%;
        animation-duration: ${3 + Math.random() * 5}s;
        animation-delay: ${-Math.random() * 8}s;
        box-shadow: 0 0 8px ${color};
        width: ${4 + Math.random() * 6}px;
        height: ${4 + Math.random() * 6}px;
        transform-origin: ${-100 + Math.random() * -200}px;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
